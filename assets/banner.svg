<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <clipPath id="rounded">
      <rect width="900" height="280" rx="10" ry="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="280" fill="#eeedeb" rx="10" ry="10"/>
    <!-- Left red bar -->
    <rect x="0" y="0" width="5" height="280" fill="#cc2200"/>
    <!-- Right red bar -->
    <rect x="895" y="0" width="5" height="280" fill="#cc2200"/>

    <!-- Name — below glasses -->
    <text x="55" y="140" fill="#000000" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold">Tanacha Gaines, EdD</text>

    <!-- Subtitle — below name -->
    <text x="55" y="175" fill="#888888" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" letter-spacing="2.5">PRODUCT OPERATIONS  ·  AI ENABLEMENT  ·  PRODUCT SYSTEMS</text>

    <!-- Divider -->
    <line x1="55" y1="200" x2="845" y2="200" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Tagline -->
    <text x="55" y="235" fill="#cc2200" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic">Clarity precedes scale.</text>

    <!-- Watermark -->
    <text x="845" y="262" fill="#444444" font-family="Georgia, 'Times New Roman', serif" font-size="12" text-anchor="end">opsided.com</text>
  </g>
</svg>
